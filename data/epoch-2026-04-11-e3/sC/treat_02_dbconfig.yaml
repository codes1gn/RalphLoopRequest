# Database connection profile (example — wire to your app’s loader)
version: 1

database:
  driver: postgres
  host: ${DB_HOST}
  port: ${DB_PORT:-5432}
  name: ${DB_NAME}
  user: ${DB_USER}
  # Password read from process env, not stored in this file
  password_from_env: DB_PASSWORD

  ssl:
    mode: prefer # disable | allow | prefer | require | verify-full

  pool:
    min_connections: 2
    max_connections: 10
    connect_timeout_seconds: 10
    idle_timeout_seconds: 300

  migrations:
    table: schema_migrations
    directory: ./migrations
