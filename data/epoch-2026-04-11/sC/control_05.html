<script>
(function () {
  var raw = document.getElementById("tree-data").textContent;
  var root = JSON.parse(raw);
  var treeEl = document.getElementById("tree");

  function isFolder(n) { return n.type === "dir"; }
  function hasKids(n) { return isFolder(n) && n.children && n.children.length > 0; }

  function makeRow(node, depth) {
    var wrap = document.createElement("div");
    wrap.className = "node";

    var row = document.createElement("div");
    row.className = "row";

    var toggle = document.createElement("button");
    toggle.type = "button";
    toggle.className = "toggle";
    toggle.setAttribute("aria-label", "toggle");

    var spacer = document.createElement("span");
    spacer.className = "spacer";
    spacer.setAttribute("aria-hidden", "true");

    var name = document.createElement("span");
    name.className = "name " + (isFolder(node) ? "dir" : node.type === "link" ? "link" : "file");
    name.textContent = node.name;
    if (node.truncated) {
      var tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = "(contents omitted)";
      name.appendChild(tag);
    }

    var kidsWrap = null;

    if (hasKids(node)) {
      toggle.textContent = "\u25bc";
      toggle.addEventListener("click", function () {
        var collapsed = kidsWrap.classList.toggle("collapsed");
        toggle.textContent = collapsed ? "\u25b6" : "\u25bc";
        toggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
      });
      row.appendChild(toggle);
      kidsWrap = document.createElement("div");
      kidsWrap.className = "kids";
      for (var i = 0; i < node.children.length; i++) {
        kidsWrap.appendChild(makeRow(node.children[i], depth + 1));
      }
      toggle.setAttribute("aria-expanded", "true");
    } else {
      toggle.disabled = true;
      toggle.textContent = "\u00b7";
      row.appendChild(spacer);
    }

    row.appendChild(name);
    wrap.appendChild(row);
    if (kidsWrap) wrap.appendChild(kidsWrap);
    return wrap;
  }

  treeEl.appendChild(makeRow(root, 0));

  function walkNodes(el, fn) {
    var kids = el.querySelectorAll(":scope > .node");
    for (var i = 0; i < kids.length; i++) fn(kids[i]);
  }

  function setExpanded(nodeEl, expanded) {
    var row = nodeEl.querySelector(":scope > .row");
    var toggle = row.querySelector(".toggle");
    var kids = nodeEl.querySelector(":scope > .kids");
    if (!kids || toggle.disabled) return;
    if (expanded) {
      kids.classList.remove("collapsed");
      toggle.textContent = "\u25bc";
      toggle.setAttribute("aria-expanded", "true");
    } else {
      kids.classList.add("collapsed");
      toggle.textContent = "\u25b6";
      toggle.setAttribute("aria-expanded", "false");
    }
    walkNodes(kids, function (child) { setExpanded(child, expanded); });
  }

  document.getElementById("expand-all").addEventListener("click", function () {
    walkNodes(treeEl, function (n) { setExpanded(n, true); });
  });
  document.getElementById("collapse-all").addEventListener("click", function () {
    walkNodes(treeEl, function (n) { setExpanded(n, false); });
  });
})();
</script>
